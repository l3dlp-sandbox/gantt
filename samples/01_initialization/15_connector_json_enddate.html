<!DOCTYPE html>
<head>
	<meta http-equiv="Content-type" content="text/html; charset=utf-8">
	<title>Loading tasks with start/end dates</title>
	<script src="../../codebase/dhtmlxgantt.js"></script>
	<script src="../common/webserver_warning.js"></script>
	<link rel="stylesheet" href="../../codebase/dhtmlxgantt.css">
	<style>
		html, body {
			height: 100%;
			padding: 0px;
			margin: 0px;
			overflow: hidden;
		}
	</style>
</head>

<body>
<div id="gantt_here" style='width:100%; height:100%;'></div>
<script>
	gantt.attachEvent("onAjaxError", function(request){
		if (!request.status || !request.response){
			gantt.message({
				text: webserverWarningText,
				expire: -1
			})
		}
		return true;
	});

	gantt.config.date_format = "%Y-%m-%d %H:%i:%s";
	gantt.init("gantt_here");
	gantt.load("../common/data_start_end_dates.json");
</script>
</body>
